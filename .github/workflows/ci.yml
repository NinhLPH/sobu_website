name: CI/CD Pipeline

on:
  push:
    branches: [ "dev" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: sobu-backend
  FRONTEND_IMAGE_NAME: sobu-frontend

jobs:
  frontend-test:
    name: React tests
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: frontend/fe-feature-homepage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/fe-feature-homepage/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run React tests
        run: npm test -- --watchAll=false --passWithNoTests

  backend-test:
    name: Spring Boot tests
    runs-on: ubuntu-22.04

    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://127.0.0.1:3306/sobu?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: root
      DB_PASSWORD: 1234
      JWT_SECRET: 3f9a8c1d7e5b4a2f9c6e8d1b7a3c5f2e9d4b6a1c8e7f5d3b2a9c1e6f8d4b7a2
      JWT_ACCESS_TOKEN_EXPIRATION: "900000"
      JWT_REFRESH_TOKEN_EXPIRATION: "604800000"
      ENCRYPTION_SECRET_KEY: 9a7c5e3f1b2d4a6c8e0f3b5d7a9c1e2f
      API_KEY: ci-api-key-8f3d2c1b7a6e5f4d
      SERVER_BASE_URL: http://localhost:8081
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081
      CORS_MAX_AGE: "3600"
      APP_STORAGE_TYPE: local
      APP_STORAGE_LOCAL_DIR: uploads
      NHANH_CLIENT_ID: ci-nhanh-client-id
      NHANH_CLIENT_SECRET: ci-nhanh-client-secret
      NHANH_REDIRECT_URI: http://localhost:8081/api/nhanh/oauth/callback
      NHANH_BUSINESS_ID: "0"
      NHANH_BASE_URL: https://pos.open.nhanh.vn/api
      NHANH_SYNC_CRON: "0 0 * * * *"
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: ci@example.com
      MAIL_PASSWORD: ci-mail-password

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1234
          MYSQL_DATABASE: sodu
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -p1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Wait for MySQL readiness
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Build Maven package
        run: ./mvnw -B -DskipTests package

      - name: Upload backend jar
        uses: actions/upload-artifact@v4.3.1
        with:
          name: backend-jar-${{ github.sha }}
          path: backend/target/*.jar

  docker-package:
    name: Docker build, scan, and push
    runs-on: ubuntu-22.04
    needs: [ frontend-test, backend-test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.2

      - name: Prepare image names
        run: |
          echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=dev-${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build backend Docker image
        run: |
          docker build \
            -t "${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:dev" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" \
            backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -t "${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:dev" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}" \
            frontend/fe-feature-homepage

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend Docker image
        run: |
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:dev"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"

      - name: Push frontend Docker image
        run: |
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:dev"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"

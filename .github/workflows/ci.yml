name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-build:
    runs-on: ubuntu-22.04
    
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/sodu
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      NHANH_CLIENT_ID: ${{ secrets.NHANH_CLIENT_ID }}
      NHANH_CLIENT_SECRET: ${{ secrets.NHANH_CLIENT_SECRET }}
      NHANH_REDIRECT_URI: ${{ secrets.NHANH_REDIRECT_URI }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sodu
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4.1.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for MySQL readiness
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Build and Test with Maven
        run: ./mvnw clean verify

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.3.1
        with:
          name: backend-jar-${{ github.sha }}
          path: backend/target/*.jar

  deploy:
    needs: backend-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    
    defaults:
      run:
        working-directory: backend
        
    steps:
      - uses: actions/checkout@v4.1.2
      
      - name: Download Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: backend-jar-${{ github.sha }}
          path: backend/target/
          
      - name: Build Docker Image
        run: docker build -t backend-app:${{ github.sha }} .
        
      - name: Export Docker Image
        run: docker save backend-app:${{ github.sha }} -o backend-app-${{ github.sha }}.tar
        
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4.3.1
        with:
          name: backend-image-${{ github.sha }}
          path: backend/backend-app-${{ github.sha }}.tar
        
      - name: Deploy to Production
        run: echo "Deploy logic goes here"

# ========================
# DATABASE
# ========================
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/sobu?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:sobu_user}
spring.datasource.password=${DB_PASSWORD:sobu_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / INIT DB
# ========================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sampleData.sql
spring.jpa.defer-datasource-initialization=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ========================
# APP DEFAULTS FOR LOCAL DOCKER
# ========================
jwt.secret=${JWT_SECRET:3f9a8c1d7e5b4a2f9c6e8d1b7a3c5f2e9d4b6a1c8e7f5d3b2a9c1e6f8d4b7a2}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
encryption.secret-key=${ENCRYPTION_SECRET_KEY:9a7c5e3f1b2d4a6c8e0f3b5d7a9c1e2f}
api.key=${API_KEY:docker-api-key-8f3d2c1b7a6e5f4d}
server.base-url=${SERVER_BASE_URL:http://localhost:8081}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8081}
cors.max-age=${CORS_MAX_AGE:3600}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.org.springframework.security=INFO

# ========================
# NHANH (boot-safe local defaults)
# ========================
nhanh.client-id=${NHANH_CLIENT_ID:docker-nhanh-client-id}
nhanh.business-id=${NHANH_BUSINESS_ID:docker-local-business}
nhanh.client-secret=${NHANH_CLIENT_SECRET:docker-nhanh-client-secret}
nhanh.redirect-uri=${NHANH_REDIRECT_URI:http://localhost:8081/api/nhanh/oauth/callback}
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}

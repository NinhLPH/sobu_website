# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / INIT DB
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.data-locations=classpath:sampleData.sql
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true

# APP
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
encryption.secret-key=${ENCRYPTION_SECRET_KEY}
api.key=${API_KEY}

server.base-url=${SERVER_BASE_URL:http://localhost:8081}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8081,http://localhost:3000,https://sobu-jet.vercel.app,https://sobu.com.vn,http://sobu.com.vn}
cors.max-age=${CORS_MAX_AGE:3600}

# MAIL
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

# LOGGING
logging.level.root=INFO
logging.level.org.springframework.security=INFO

# NHANH
nhanh.client-id=${NHANH_CLIENT_ID:docker-nhanh-client-id}
nhanh.business-id=${NHANH_BUSINESS_ID:docker-business-id}
nhanh.client-secret=${NHANH_CLIENT_SECRET:docker-nhanh-client-secret}
nhanh.redirect-uri=${NHANH_REDIRECT_URI:http://localhost:8081/api/nhanh/oauth/callback}
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}
nhanh.location.path=${NHANH_LOCATION_PATH:/v3.0/shipping/location}
nhanh.location.version=${NHANH_LOCATION_VERSION:v1}
nhanh.location.cache-ttl-hours=${NHANH_LOCATION_CACHE_TTL_HOURS:24}
nhanh.location.request-interval-ms=${NHANH_LOCATION_REQUEST_INTERVAL_MS:250}
nhanh.location.rate-limit-max-attempts=${NHANH_LOCATION_RATE_LIMIT_MAX_ATTEMPTS:5}
nhanh.location.rate-limit-unlock-buffer-seconds=${NHANH_LOCATION_RATE_LIMIT_UNLOCK_BUFFER_SECONDS:1}

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/payment/return}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/payment/cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8081/api/payos/webhooks/callback}
payos.gateway-mode=${PAYOS_GATEWAY_MODE:mock}

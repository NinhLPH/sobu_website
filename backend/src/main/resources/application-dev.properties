# ========================
# DATABASE - LOCAL DEV
# ========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sobu?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / DATABASE INIT
# ========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.generate-ddl=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.data-locations=classpath:sampleData.sql

# ========================
# JWT - DEV ONLY
# ========================
jwt.secret=${JWT_SECRET:dev-jwt-secret-change-me}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ========================
# SECURITY / APP CONFIG
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY:dev-encryption-secret-change-me}
api.key=${API_KEY:dev-api-key-change-me}

server.base-url=${SERVER_BASE_URL:http://localhost:8081}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8081,http://localhost:3000}
cors.max-age=${CORS_MAX_AGE:3600}

# ========================
# MAIL - LOCAL DEV
# ========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# NHANH - LOCAL DEV
# ========================
nhanh.client-id=${NHANH_CLIENT_ID:dev-nhanh-client-id}
nhanh.business-id=${NHANH_BUSINESS_ID:dev-local-business}
nhanh.client-secret=${NHANH_CLIENT_SECRET:dev-nhanh-client-secret}
nhanh.redirect-uri=${NHANH_REDIRECT_URI:http://localhost:8081/api/nhanh/oauth/callback}
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/payment/return}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/payment/cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8081/api/payos/webhooks/callback}
payos.gateway-mode=${PAYOS_GATEWAY_MODE:mock}

spring.application.name=sodu
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.codec.max-in-memory-size=10MB
server.port=8081
# Use SPRING_PROFILES_ACTIVE to override this default.
spring.jpa.open-in-view=false
spring.profiles.default=dev

# Storage Configuration
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.dir=${APP_STORAGE_LOCAL_DIR:uploads}

# Nhanh defaults shared by all profiles. Credential values are profile/env-specific.
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.sync.cron=${NHANH_SYNC_CRON:0 0 * * * *}

management.endpoints.web.exposure.include=health,info,nhanhHealth

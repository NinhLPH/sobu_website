# ========================
# APPLICATION
# ========================
spring.application.name=sobu
server.port=${SERVER_PORT:8081}

# Default profile if SPRING_PROFILES_ACTIVE is not set
spring.profiles.default=dev

# ========================
# WEB / FILE UPLOAD
# ========================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.codec.max-in-memory-size=${MAX_IN_MEMORY_SIZE:10MB}

# ========================
# JPA COMMON
# ========================
spring.jpa.open-in-view=false

# ========================
# STORAGE
# ========================
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.dir=${APP_STORAGE_LOCAL_DIR:uploads}

# ========================
# NHANH COMMON
# ========================
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.sync.cron=${NHANH_SYNC_CRON:0 0 * * * *}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}
nhanh.location.path=${NHANH_LOCATION_PATH:/v3.0/shipping/location}
nhanh.location.version=${NHANH_LOCATION_VERSION:v1}
nhanh.location.cache-ttl-hours=${NHANH_LOCATION_CACHE_TTL_HOURS:24}

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=health,info,nhanhHealth

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/payment/return}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/payment/cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8081/api/payos/webhooks/callback}
payos.gateway-mode=${PAYOS_GATEWAY_MODE:mock}

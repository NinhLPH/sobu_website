# ========================
# APPLICATION
# ========================
spring.application.name=sobu
server.port=${SERVER_PORT:8081}

# Default profile if SPRING_PROFILES_ACTIVE is not set
spring.profiles.default=dev

# ========================
# WEB
# ========================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.codec.max-in-memory-size=${MAX_IN_MEMORY_SIZE:10MB}

# ========================
# JPA
# ========================
spring.jpa.open-in-view=false

# ========================
# STORAGE
# ========================
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.dir=${APP_STORAGE_LOCAL_DIR:uploads}

# ========================
# MAIL
# ========================
app.mail.from-address=${APP_MAIL_FROM_ADDRESS:${spring.mail.username:}}

# ========================
# PASSWORD RESET
# ========================
app.reset-password.frontend-reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password?token=}
app.reset-password.secret-key=${RESET_PASSWORD_SECRET_KEY}
app.reset-password.token-expiration-ms=${RESET_PASSWORD_TOKEN_EXPIRATION_MS:900000}
app.reset-password.cooldown-ms=${RESET_PASSWORD_COOLDOWN_MS:60000}

# ========================
# GOOGLE OAUTH
# ========================
google.client-id=${GOOGLE_CLIENT_ID:}

# ========================
# NHANH
# ========================
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.sync.cron=${NHANH_SYNC_CRON:0 0 */12 * * *}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}
nhanh.location.path=${NHANH_LOCATION_PATH:/v3.0/shipping/location}
nhanh.location.version=${NHANH_LOCATION_VERSION:v1}
nhanh.location.cache-ttl-hours=${NHANH_LOCATION_CACHE_TTL_HOURS:24}
nhanh.location.request-interval-ms=${NHANH_LOCATION_REQUEST_INTERVAL_MS:250}
nhanh.location.rate-limit-max-attempts=${NHANH_LOCATION_RATE_LIMIT_MAX_ATTEMPTS:5}
nhanh.location.rate-limit-unlock-buffer-seconds=${NHANH_LOCATION_RATE_LIMIT_UNLOCK_BUFFER_SECONDS:1}
nhanh.location.retry-after-seconds=${NHANH_LOCATION_RETRY_AFTER_SECONDS:30}
nhanh.location.rolling-window-ms=${NHANH_LOCATION_ROLLING_WINDOW_MS:30000}
nhanh.location.rolling-window-max-requests=${NHANH_LOCATION_ROLLING_WINDOW_MAX_REQUESTS:120}
nhanh.location.inter-chunk-sleep-ms=${NHANH_LOCATION_INTER_CHUNK_SLEEP_MS:60000}
nhanh.location.chunk-size=${NHANH_LOCATION_CHUNK_SIZE:5}
nhanh.location.max-attempts-per-request=${NHANH_LOCATION_MAX_ATTEMPTS_PER_REQUEST:5}
nhanh.location.extended-lock-threshold-ms=${NHANH_LOCATION_EXTENDED_LOCK_THRESHOLD_MS:300000}
nhanh.location.retry-backoff-seconds=${NHANH_LOCATION_RETRY_BACKOFF_SECONDS:1,2,5}
nhanh.shipping.fee-path=${NHANH_SHIPPING_FEE_PATH:/v3.0/shipping/fee}
nhanh.shipping.type=${NHANH_SHIPPING_TYPE:1}
nhanh.shipping.carrier.id=${NHANH_SHIPPING_CARRIER_ID:22151}
nhanh.shipping.carrier.standard-service=${NHANH_SHIPPING_CARRIER_STANDARD_SERVICE:VCN}
nhanh.shipping.carrier.express-service=${NHANH_SHIPPING_CARRIER_EXPRESS_SERVICE:VHT}
nhanh.shipping.carrier.express-fallback-id=${NHANH_SHIPPING_CARRIER_EXPRESS_FALLBACK_ID:22384}
nhanh.shipping.defaults.weight=${NHANH_SHIPPING_DEFAULT_WEIGHT:1000}
nhanh.shipping.origin.address=${NHANH_SHIPPING_ORIGIN_ADDRESS:P. Hàng Trống, Q. Hoàn Kiếm, Hà Nội}
nhanh.shipping.origin.city-id=${NHANH_SHIPPING_ORIGIN_CITY_ID:1}
nhanh.shipping.origin.district-id=${NHANH_SHIPPING_ORIGIN_DISTRICT_ID:1}
nhanh.shipping.origin.ward-id=${NHANH_SHIPPING_ORIGIN_WARD_ID:1}

# ========================
# REDIS
# ========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2000ms}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:8}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:0}

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=health,info,nhanhHealth

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:3000/payment/return}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:3000/payment/cancel}
payos.webhook-url=${PAYOS_WEBHOOK_URL:http://localhost:8081/api/payos/webhooks/callback}
payos.gateway-mode=${PAYOS_GATEWAY_MODE:mock}

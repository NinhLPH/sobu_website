# ========================
# REDIS
# ========================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# ========================
# DATABASE
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ========================
# SECURITY
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY}
api.key=${API_KEY}

# ========================
# WEB
# ========================
server.base-url=${SERVER_BASE_URL}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8081,http://localhost:3000,https://sobu-jet.vercel.app,https://sobu.com.vn,http://sobu.com.vn}
cors.max-age=${CORS_MAX_AGE:3600}

# ========================
# MAIL
# ========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# GOOGLE OAUTH
# ========================
google.client-id=${GOOGLE_CLIENT_ID}

# ========================
# PASSWORD RESET
# ========================
app.reset-password.frontend-reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL}

# ========================
# NHANH
# ========================
nhanh.client-id=${NHANH_CLIENT_ID}
nhanh.client-secret=${NHANH_CLIENT_SECRET}
nhanh.redirect-uri=${NHANH_REDIRECT_URI}
nhanh.business-id=${NHANH_BUSINESS_ID}
nhanh.webhooks.verify-token=${NHANH_WEBHOOKS_VERIFYTOKEN}

# ========================
# SECURITY HARDENING
# ========================
server.error.include-message=never
server.error.include-stacktrace=never

# ========================
# LOGGING
# ========================
logging.level.root=WARN
logging.level.org.springframework.security=ERROR

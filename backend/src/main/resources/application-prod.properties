# ========================
# DATABASE
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ========================
# ENCRYPTION
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY}
api.key=${API_KEY}

# ========================
# SERVER / CORS
# ========================
server.base-url=${SERVER_BASE_URL}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.max-age=${CORS_MAX_AGE:3600}

# ========================
# MAIL
# ========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# NHANH
# ========================
nhanh.client-id=${NHANH_CLIENT_ID}
nhanh.client-secret=${NHANH_CLIENT_SECRET}
nhanh.redirect-uri=${NHANH_REDIRECT_URI}
nhanh.business-id=${NHANH_BUSINESS_ID}
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}
nhanh.location.path=${NHANH_LOCATION_PATH:/v3.0/shipping/location}
nhanh.location.version=${NHANH_LOCATION_VERSION:v1}
nhanh.location.cache-ttl-hours=${NHANH_LOCATION_CACHE_TTL_HOURS:24}

# ========================
# SECURITY HARDENING
# ========================
server.error.include-message=never
server.error.include-stacktrace=never

# ========================
# LOGGING
# ========================
logging.level.root=WARN
logging.level.org.springframework.security=ERROR

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

# ========================
# DATABASE
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ========================
# SECURITY
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY}
api.key=${API_KEY}

# ========================
# WEB
# ========================
server.base-url=${SERVER_BASE_URL}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8081,http://localhost:3000,https://sobu-jet.vercel.app,https://sobu.com.vn,http://sobu.com.vn}
cors.max-age=${CORS_MAX_AGE:3600}

# ========================
# MAIL
# ========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# GOOGLE OAUTH
# ========================
google.client-id=${GOOGLE_CLIENT_ID}

# ========================
# NHANH
# ========================
nhanh.client-id=${NHANH_CLIENT_ID}
nhanh.client-secret=${NHANH_CLIENT_SECRET}
nhanh.redirect-uri=${NHANH_REDIRECT_URI}
nhanh.business-id=${NHANH_BUSINESS_ID}
nhanh.base-url=${NHANH_BASE_URL:https://pos.open.nhanh.vn/api}
nhanh.depot-id=${NHANH_DEPOT_ID:0}
nhanh.accounting.account-id=${NHANH_ACCOUNTING_ACCOUNT_ID:0}
nhanh.location.path=${NHANH_LOCATION_PATH:/v3.0/shipping/location}
nhanh.location.version=${NHANH_LOCATION_VERSION:v1}
nhanh.location.cache-ttl-hours=${NHANH_LOCATION_CACHE_TTL_HOURS:24}
nhanh.location.request-interval-ms=${NHANH_LOCATION_REQUEST_INTERVAL_MS:250}
nhanh.location.rate-limit-max-attempts=${NHANH_LOCATION_RATE_LIMIT_MAX_ATTEMPTS:5}
nhanh.location.rate-limit-unlock-buffer-seconds=${NHANH_LOCATION_RATE_LIMIT_UNLOCK_BUFFER_SECONDS:1}
nhanh.location.retry-after-seconds=${NHANH_LOCATION_RETRY_AFTER_SECONDS:30}
nhanh.location.rolling-window-ms=${NHANH_LOCATION_ROLLING_WINDOW_MS:30000}
nhanh.location.rolling-window-max-requests=${NHANH_LOCATION_ROLLING_WINDOW_MAX_REQUESTS:120}
nhanh.location.inter-chunk-sleep-ms=${NHANH_LOCATION_INTER_CHUNK_SLEEP_MS:60000}
nhanh.location.chunk-size=${NHANH_LOCATION_CHUNK_SIZE:5}
nhanh.location.max-attempts-per-request=${NHANH_LOCATION_MAX_ATTEMPTS_PER_REQUEST:5}
nhanh.location.extended-lock-threshold-ms=${NHANH_LOCATION_EXTENDED_LOCK_THRESHOLD_MS:300000}
nhanh.location.retry-backoff-seconds=${NHANH_LOCATION_RETRY_BACKOFF_SECONDS:1,2,5}
nhanh.shipping.fee-path=${NHANH_SHIPPING_FEE_PATH:/v3.0/shipping/fee}
nhanh.shipping.type=${NHANH_SHIPPING_TYPE:SHOPPING}
nhanh.shipping.defaults.weight=${NHANH_SHIPPING_DEFAULT_WEIGHT:1000}
nhanh.shipping.send-carrier-type=${NHANH_SHIPPING_SEND_CARRIER_TYPE:1}
nhanh.shipping.origin.address=${NHANH_SHIPPING_ORIGIN_ADDRESS:}
nhanh.shipping.origin.city-id=${NHANH_SHIPPING_ORIGIN_CITY_ID:0}
nhanh.shipping.origin.district-id=${NHANH_SHIPPING_ORIGIN_DISTRICT_ID:0}
nhanh.shipping.origin.ward-id=${NHANH_SHIPPING_ORIGIN_WARD_ID:0}

# ========================
# SECURITY HARDENING
# ========================
server.error.include-message=never
server.error.include-stacktrace=never

# ========================
# LOGGING
# ========================
logging.level.root=WARN
logging.level.org.springframework.security=ERROR

# ========================
# PAYOS
# ========================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

services:
  mysql:
    image: mysql:8.0
    container_name: sobu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: sobu
      MYSQL_USER: user1
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: quanngo205/sobu-backend:1.0.3
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sobu-backend
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sobu
      SPRING_DATASOURCE_USERNAME: user1
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "8081:8081"

volumes:
  mysql_data:
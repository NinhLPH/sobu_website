services:
  # ========================
  # MySQL Database
  # ========================
  mysql:
    image: mysql:8.0
    container_name: sobu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sodu}
      MYSQL_USER: ${MYSQL_USER:-sobu_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sobu_pass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sobu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================
  # Spring Boot Backend
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sobu-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Database (points to the mysql service)
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sodu}
      DB_USERNAME: ${MYSQL_USER:-sobu_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-sobu_pass}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}

      # Encryption
      ENCRYPTION_SECRET_KEY: ${ENCRYPTION_SECRET_KEY:-}
      API_KEY: ${API_KEY:-}

      # Mail
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # Nhanh Integration
      NHANH_CLIENT_ID: ${NHANH_CLIENT_ID:-}
      NHANH_CLIENT_SECRET: ${NHANH_CLIENT_SECRET:-}
      NHANH_REDIRECT_URI: ${NHANH_REDIRECT_URI:-}

      # JVM tuning
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - sobu-network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  sobu-network:
    driver: bridge
